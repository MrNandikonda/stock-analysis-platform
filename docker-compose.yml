services:
  backend:
    image: stock-screener-backend:alpine
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-screener-backend
    mem_limit: 768m
    cpus: 1.5
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/stocks.db
      - RUN_SCHEDULER_IN_API=false
    volumes:
      - screener_data:/app/data
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    user: "0:0"
    command: ["sh", "-c", "python migrations/run_migrations.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    restart: unless-stopped

  scheduler:
    image: stock-screener-backend:alpine
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-screener-scheduler
    mem_limit: 256m
    cpus: 0.5
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/stocks.db
      - RUN_SCHEDULER_IN_API=false
    command: ["sh", "-c", "python migrations/run_migrations.py && python -m app.scheduler_runner"]
    volumes:
      - screener_data:/app/data
    user: "0:0"
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: stock-screener-frontend:nginx-alpine
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: stock-screener-frontend
    mem_limit: 128m
    cpus: 0.5
    environment:
      NGINX_SERVER_NAMES: ${PUBLIC_HOSTNAMES:-localhost 127.0.0.1}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  screener_data:
